services:
  - type: web
    name: automod-backend
    env: python
    plan: free
    buildCommand: uv sync --locked --no-dev
    startCommand: uv rungunicorn "api2:create_app()" --bind 0.0.0.0:$PORT
    healthCheckPath: /healthz
    envVars:
      - key: OAUTH_PROVIDER
        value: fluxer
      - key: FLUXER_AUTHORIZE_URL
        value: https://api.fluxer.app/v1/oauth2/authorize
      - key: FLUXER_TOKEN_URL
        value: https://api.fluxer.app/v1/oauth2/token
      - key: FLUXER_API_BASE_URL
        value: https://api.fluxer.app/v1
      - key: FLUXER_USER_ENDPOINT
        value: https://api.fluxer.app/v1/oauth2/userinfo
      - key: ENVIRONMENT
        value: production
      - key: SESSION_SAME_SITE
        value: none
      - key: SESSION_HTTPS_ONLY
        value: "true"
      - key: FLUXER_CLIENT_ID
        sync: false
      - key: FLUXER_CLIENT_SECRET
        sync: false
      - key: SESSION_SECRET
        sync: false
      - key: OAUTH_REDIRECT_URI
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB_NAME
        value: fluxmod
      - key: MONGODB_COLLECTION_NAME
        value: app_data
      - key: MONGODB_DOCUMENT_ID
        value: singleton
